server {
    # Listen on port 8080 as required by default in Google Cloud Run
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This allows React/Vite to handle client-side routing smoothly
        try_files $uri $uri/ /index.html;
    }

    # Standard error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
